<!-- Box 1: Estrutura institucional -->
<g onclick="sendPrompt('Como os regimes jurídicos celetista e estatutário configuram a estrutura institucional do trabalho nos hospitais universitários?')" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
